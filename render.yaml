# Render Blueprint — marfyl-backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: marfyl-backend
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && NODE_OPTIONS=--max-old-space-size=4096 pnpm build
    startCommand: pnpm prisma:deploy && pnpm start:prod
    healthCheckPath: /api/public/db-ping
    envVars:
      - key: NODE_ENV
        value: production
      # Usar connection string POOLED de Neon (sin channel_binding=require)
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://marfyl-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://marfyl.site,https://www.marfyl.site,https://marfyl-frontend.onrender.com
      - key: CONCERT_FEATURE_ENABLED
        value: "true"
      - key: CONCERT_AUTO_SETUP_MONDDY
        value: "true"
      - key: CONCERT_DEFAULT_SLUG
        value: hemenegilda-capacidad
      - key: CONCERT_PENDING_ORDER_HOURS
        value: "2"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev
      - key: RESEND_FROM_NAME
        value: MARFYL Entradas
      - key: CONCERT_OWNER_NOTIFY_EMAIL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
