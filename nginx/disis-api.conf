# Configuración Nginx para DISIS API
# Ubicación: /etc/nginx/sites-available/disis-api
# Dominio: api.[DOMINIO] (ej: api.tudominio.com)

# Redirir HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.[DOMINIO] www.api.[DOMINIO];

    # Redirigir todo el tráfico HTTP a HTTPS
    return 301 https://$server_name$request_uri;
}

# Configuración HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.[DOMINIO] www.api.[DOMINIO];

    # Certificados SSL (configurar con Let's Encrypt o tu CA)
    ssl_certificate /etc/letsencrypt/live/api.[DOMINIO]/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.[DOMINIO]/privkey.pem;
    
    # Configuración SSL moderna y segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Tamaño máximo de archivo para uploads (ajustar según necesidad)
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;

    # Logs
    access_log /var/log/nginx/disis-api-access.log;
    error_log /var/log/nginx/disis-api-error.log;

    # Proxy pass al backend NestJS
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        
        # Headers para proxy real (importante para obtener IP real del cliente)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Headers para WebSockets (si los usas en el futuro)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Buffering (desactivar para streaming)
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts para requests largos
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Servir archivos estáticos directamente desde Nginx (más eficiente)
    location /uploads/ {
        alias /home/ubuntu/disis-api/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # CORS para archivos estáticos
        add_header Access-Control-Allow-Origin "https://[DOMINIO]" always;
        add_header Access-Control-Allow-Origin "https://www.[DOMINIO]" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization" always;
        
        # Opciones preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://[DOMINIO]";
            add_header Access-Control-Allow-Origin "https://www.[DOMINIO]";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Health check endpoint (opcional)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
